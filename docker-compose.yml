version: "3.9"

services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: promo_db
      POSTGRES_USER: promo_user
      POSTGRES_PASSWORD: promo_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      POSTGRES_DB: promo_db
      POSTGRES_USER: promo_user
      POSTGRES_PASSWORD: promo_password
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      DJANGO_DEBUG: "true"

volumes:
  postgres_data:

